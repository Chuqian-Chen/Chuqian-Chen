<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061A1A"/>
      <stop offset="0.46" stop-color="#0B2B36"/>
      <stop offset="1" stop-color="#121B3D"/>
    </linearGradient>
    <linearGradient id="pulse" x1="153" y1="267" x2="1047" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="0.52" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
