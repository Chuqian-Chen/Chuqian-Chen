  <path d="M68 246C166 150 243 208 322 176C404 142 438 63 525 105C613 147 629 238 726 211C822 184 827 94 923 97C1006 99 1079 164 1132 126" stroke="#E8FFFF" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round"/>

